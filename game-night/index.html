<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Night — Marcador de Pontos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/king.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-title">♟ GAME NIGHT</div>
      <div class="topbar-sub">Marcador de Pontos</div>
    </div>
    <nav class="tab-row" id="tab-row">
      <button class="tab-btn active" data-module="king">King</button>
      <button class="tab-btn" data-module="coming-soon">+ Módulo</button>
    </nav>
  </header>

  <!-- MODULES -->
  <main>

    <!-- KING MODULE -->
    <section id="mod-king" class="module active">

      <div class="module-header">
        <div class="module-header-left">
          <div class="module-title">♛ King</div>
          <div class="module-sub">Seleciona a ronda</div>
        </div>
        <div class="module-header-actions">
          <button class="btn-secondary btn-sm" id="btn-add-player">+ Jogador</button>
          <button class="btn-danger btn-sm" id="btn-reset">↺ Reset</button>
        </div>
      </div>

      <!-- Round pills -->
      <div class="round-pills" id="round-pills"></div>

      <!-- Totals summary -->
      <div class="totals-bar" id="totals-bar"></div>

      <!-- Scorecard table -->
      <div class="table-wrap">
        <table id="scorecard"></table>
      </div>

      <!-- Action buttons -->
      <div class="actions-row">
        <button class="btn-primary" id="btn-save-round">✓ Guardar Ronda</button>
        <button class="btn-secondary" id="btn-add-festa">+ Festa</button>
        <button class="btn-danger" id="btn-remove-festa" style="display:none">− Festa</button>
      </div>

    </section>

    <!-- COMING SOON MODULE -->
    <section id="mod-coming-soon" class="module">
      <div class="coming-soon">
        <div class="cs-icon">🎲</div>
        <div class="cs-title">Mais módulos em breve</div>
        <div class="cs-sub">Scopone, Sueca, Buraco, Uno...</div>
      </div>
    </section>

  </main>

  <!-- ADD PLAYER MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <h3>Novo Jogador</h3>
      <p>Adiciona um jogador à partida</p>
      <div class="mfield">
        <label for="pname-inp">Nome</label>
        <input type="text" id="pname-inp" placeholder="Ex: João" maxlength="12" />
      </div>
      <div class="mfield">
        <label>Cor</label>
        <div class="cpicker" id="cpicker"></div>
      </div>
      <div class="mactions">
        <button class="btn-primary" id="btn-confirm-player">Adicionar</button>
        <button class="btn-secondary" id="btn-cancel-player">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- CONFETTI CONTAINER -->
  <div class="confetti-container" id="confetti-container"></div>

  <!-- SCRIPTS -->
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="modules/king.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
